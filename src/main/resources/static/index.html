<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Examination System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; padding: 30px; margin: 0; }
        .container { max-width: 700px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0,0,0,0.08); margin: auto; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .question-block { margin-bottom: 25px; padding: 20px; background: #f8f9fa; border-left: 5px solid #3498db; border-radius: 4px; }
        .question-text { font-size: 16px; font-weight: 600; color: #2c3e50; margin-top: 0; }
        .options { margin-top: 12px; }
        .options label { display: block; padding: 8px 12px; margin-bottom: 8px; background: white; border: 1px solid #dcdde1; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #f1f2f6; border-color: #b2bec3; }
        .options input[type="radio"] { margin-right: 10px; transform: scale(1.2); vertical-align: middle; }
        button { background: #2ecc71; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #27ae60; box-shadow: 0px 4px 10px rgba(46,204,113,0.3); }
        #result { margin-top: 25px; font-weight: bold; text-align: center; font-size: 22px; color: #2980b9; padding: 15px; background: #e3f2fd; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Java Online Examination System</h2>
    <div id="quiz-container"></div>
    <button onclick="submitExam()">Submit Exam</button>
    <div id="result"></div>
</div>

<script>
    let allQuestions = [];

    // 1. Fetch Questions from Spring Boot API
    async function loadQuestions() {
        try {
            const response = await fetch('http://localhost:8080/api/exam/questions');
            allQuestions = await response.json();
            const container = document.getElementById('quiz-container');

            container.innerHTML = allQuestions.map((q, index) => `
                <div class="question-block">
                    <p class="question-text">Q${index + 1}: ${q.questionText}</p>
                    <div class="options">
                        <label><input type="radio" name="q-${q.id}" value="A"> ${q.optionA}</label>
                        <label><input type="radio" name="q-${q.id}" value="B"> ${q.optionB}</label>
                        <label><input type="radio" name="q-${q.id}" value="C"> ${q.optionC}</label>
                        <label><input type="radio" name="q-${q.id}" value="D"> ${q.optionD}</label>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error("Error loading questions:", error);
            document.getElementById('quiz-container').innerHTML = "<p style='color:red; text-align:center;'>Failed to load questions. Is backend running?</p>";
        }
    }

    // 2. Submit Exam Answers to Backend
    async function submitExam() {
        const answers = {};
        let answeredCount = 0;

        allQuestions.forEach(q => {
            const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
            if (selected) {
                answers[q.id] = selected.value;
                answeredCount++;
            }
        });

        if (answeredCount < allQuestions.length) {
            if (!confirm("You have missed some questions. Do you still want to submit?")) {
                return;
            }
        }

        try {
            const response = await fetch('http://localhost:8080/api/exam/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(answers)
            });

            const resultText = await response.text();
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = resultText;
            resultDiv.style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } catch (error) {
            console.error("Error submitting exam:", error);
            alert("Failed to submit exam.");
        }
    }

    // Load quiz automatically when page opens
    loadQuestions();
</script>
</body>
</html>
